; PlatformIO Project Configuration File
; Vibration Dosimeter ESP32 — HAV/WBV Firmware
; Standards: ISO 5349-1 (HAV) | ISO 2631-1 (WBV)
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform             = espressif32
board                = esp32dev
framework            = arduino

; -----------------------------------------------------------
; Serial Monitor
; -----------------------------------------------------------
monitor_speed        = 115200
upload_speed         = 921600

; -----------------------------------------------------------
; Build Flags
; -----------------------------------------------------------
build_flags          =
    -O2                          ; Optimise for speed (DSP performance)
    -DCORE_DEBUG_LEVEL=3         ; ESP-IDF log level: INFO (3), WARN (2), ERROR (1)
    -DCONFIG_FREERTOS_HZ=1000    ; Set FreeRTOS tick rate to 1000 Hz (1 ms resolution)
    -DARDUINO_RUNNING_CORE=1     ; Arduino loop() on Core 1
    -DARDUINO_EVENT_RUNNING_CORE=1

; -----------------------------------------------------------
; Library Dependencies
; -----------------------------------------------------------
lib_deps             =
    adafruit/RTClib                        ; DS3231 RTC (I2C)
    adafruit/Adafruit SSD1306              ; 1.3" OLED display driver
    adafruit/Adafruit GFX Library          ; Dependency of SSD1306
    adafruit/Adafruit BusIO                ; Dependency of SSD1306/RTClib

; Note: SD.h and Wire.h are bundled with the Arduino ESP32 core — no lib_deps needed.
; Note: FreeRTOS is bundled with espressif32 platform — no separate lib_deps needed.
